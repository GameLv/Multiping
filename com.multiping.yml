AutoName: MultiPing
Summary: Monitor up to 256 hosts with a traffic-light notification
Description: |-
  MultiPing is a free and open-source network monitoring app.
  Add up to 256 hosts and monitor their availability in the background.

  Features traffic light status notification, push alerts for favourite hosts,
  battery saving modes, and 12 languages.

  No ads, no trackers, no Google Play Services.

